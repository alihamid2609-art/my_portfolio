<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Portfolio | Hamid Ali</title>
  <link rel="icon" href="images/favicon/favicon.ico" sizes="any">
  <link rel="icon" href="images/favicon/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="images/favicon/apple-touch-icon.png">
  <link rel="manifest" href="images/favicon/manifest.webmanifest">
  <link rel="stylesheet" href="css/loaders/loader.css">
  <link rel="stylesheet" type="text/css" href="css/plugins.css">
  <link rel="stylesheet" type="text/css" href="css/main.css">
</head>
<body>
  <div id="loader" class="loader">
    <div id="loaderContent" class="loader__content">
      <div class="loader__shadow"></div>
      <div class="loader__box"></div>
    </div>
  </div>

  <script src="components/header.js"></script>
  <script src="components/sidebar.js"></script>

  <div id="content" class="content">
    <div class="content__wrapper">
      <section id="portfolio" class="inner inner-first portfolio">

          <!-- Content Block - H2 Section Title Start -->
          <div class="content__block section-grid-title">
            <p class="h2__subtitle animate-in-up">
              <svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="13px" height="13px" viewBox="0 0 13 13" fill="currentColor">
                <path fill="currentColor" d="M5.6,12.6c-0.5-0.8-0.7-2.4-1.7-3.5c-1-1-2.7-1.2-3.5-1.7C-0.1,7-0.1,6,0.4,5.6c0.8-0.5,2.3-0.6,3.5-1.8
                  C5,2.8,5.1,1.2,5.6,0.4C6-0.1,7-0.1,7.4,0.4c0.5,0.8,0.7,2.4,1.8,3.5c1.2,1.2,2.6,1.2,3.5,1.7c0.6,0.4,0.6,1.4,0,1.7
                  C11.8,7.9,10.2,8,9.1,9.1c-1,1-1.2,2.7-1.7,3.5C7,13.1,6,13.1,5.6,12.6z"/>
              </svg>
              <span>Portfolio</span>
            </p>
            <h2 class="h2__title animate-in-up"></h2>
          </div>
          <!-- Content Block - H2 Section Title End -->

          <!-- Content Block - Works Gallery Start -->
          <div class="content__block grid-block">
            <div class="container-fluid px-0 inner__gallery">
              <div class="row gx-0 my-gallery" itemscope itemtype="http://schema.org/ImageGallery">
    
                <!-- Works Gallery Single Item Start -->
                <figure class="col-12 col-md-6 gallery__item grid-item animate-card-2" itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
                  <a href="images/projects/rfp.png" data-image="images/projects/rfp.png" class="gallery__link" itemprop="contentUrl" data-size="1400x1400">
                    <img src="images/projects/rfp.png" class="gallery__image" itemprop="thumbnail" alt="RFP Management Screenshot">
                  </a>
                  <figcaption class="gallery__descr" itemprop="caption description" style="display:none;">
                    <h5>RFP Management System</h5>
                    <div class="card__tags d-flex flex-wrap">
                      <span class="rounded-tag opposite">Solar Informatics</span>
                      <span class="rounded-tag opposite">Backend APIs</span>
                      <span class="rounded-tag opposite">Workflow Logic</span>
                    </div>
                    <p class="small">Designed scalable workflows for request-for-proposal handling with structured approval and status transitions.</p>
                  </figcaption>
                </figure>
                <!-- Works Gallery Single Item End -->
    
                <!-- Works Gallery Single Item Start -->
                <figure class="col-12 col-md-6 gallery__item grid-item animate-card-2" itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
                  <a href="images/projects/project.png" data-image="images/projects/project.png" class="gallery__link" itemprop="contentUrl" data-size="1400x1400">
                    <img src="images/projects/project.png" class="gallery__image" itemprop="thumbnail" alt="Project Module Screenshot">
                  </a>
                  <figcaption class="gallery__descr opposite" itemprop="caption description" style="display:none;">
                    <h5 class="opposite">Project Management Module</h5>
                    <div class="card__tags d-flex flex-wrap">
                      <span class="rounded-tag">Solar Informatics</span>
                      <span class="rounded-tag">SaaS Platform</span>
                      <span class="rounded-tag">Data Tracking</span>
                    </div>
                    <p class="small">Implemented core project entities, lifecycle tracking, and data-driven reporting support across modules.</p>
                  </figcaption>
                </figure>
                <!-- Works Gallery Single Item End -->
    
                <!-- Works Gallery Single Item Start -->
                <figure class="col-12 col-md-6 gallery__item grid-item animate-card-2" itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
                  <a href="images/projects/docuapproval.png" data-image="images/projects/docuapproval.png" class="gallery__link" itemprop="contentUrl" data-size="1400x1400">
                    <img src="images/projects/docuapproval.png" class="gallery__image" itemprop="thumbnail" alt="Document Approval Screenshot">
                  </a>
                  <figcaption class="gallery__descr opposite" itemprop="caption description" style="display:none;">
                    <h5 class="opposite">Zoho Contracts Integration</h5>
                    <div class="card__tags d-flex flex-wrap">
                      <span class="rounded-tag">Solar Informatics</span>
                      <span class="rounded-tag">Third-Party API</span>
                      <span class="rounded-tag">Automation</span>
                    </div>
                    <p class="small">Connected contract workflows with external services to automate document operations and reduce manual steps.</p>
                  </figcaption>
                </figure>
                <!-- Works Gallery Single Item End -->
    
                <!-- Works Gallery Single Item Start -->
                <figure class="col-12 col-md-6 gallery__item grid-item animate-card-2" itemprop="associatedMedia" itemscope itemtype="http://schema.org/ImageObject">
                  <a href="images/projects/daily-report.png" data-image="images/projects/daily-report.png" class="gallery__link" itemprop="contentUrl" data-size="1400x1400">
                    <img src="images/projects/daily-report.png" class="gallery__image" itemprop="thumbnail" alt="Daily Report Screenshot">
                  </a>
                  <figcaption class="gallery__descr " itemprop="caption description" style="display:none;">
                    <h5>Daily Reporting System</h5>
                    <div class="card__tags d-flex flex-wrap">
                      <span class="rounded-tag opposite">Solar Informatics</span>
                      <span class="rounded-tag opposite">Reporting</span>
                      <span class="rounded-tag opposite">ETL</span>
                    </div>
                    <p class="small">Built daily report generation and ETL-based data processing to provide actionable solar business insights.</p>
                  </figcaption>
                </figure>
                <!-- Works Gallery Single Item End -->
    
              </div>
            </div>
          </div>
          <!-- Content Block - Works Gallery End -->

        </section>
    </div>
  </div>

  <script src="components/footer.js"></script>

  <script src="js/libs.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/gallery-init.js"></script>
</body>
</html>
